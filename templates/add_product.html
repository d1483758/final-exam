{% extends 'base.html' %}

{% block title %}刊登商品 - 校園二手交易平台{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <h2>刊登二手商品 (F-02)</h2>
        <p class="form-subtitle">填寫以下資訊，讓其他同學看到您的二手寶貝！</p>
        
        <form action="/product/add" method="POST" enctype="multipart/form-data" class="product-form">
            <div class="form-group">
                <label for="title">商品名稱/標題 (Title) *</label>
                <input type="text" id="title" name="title" placeholder="例如: 基礎物理化學課本 九成新" required>
            </div>
            
            <div class="grid-2">
                <div class="form-group">
                    <label for="category">商品分類 (Category) *</label>
                    <select id="category" name="category" required>
                        <option value="" disabled selected>請選擇分類</option>
                        <option value="教科書">教科書</option>
                        <option value="電子產品">電子產品</option>
                        <option value="生活用品">生活用品</option>
                        <option value="自行車">自行車</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="price">欲售價格 (Price) *</label>
                    <input type="number" id="price" name="price" min="0" placeholder="請輸入價格 (TWD)" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="description">商品描述 (Description)</label>
                <textarea id="description" name="description" rows="5" placeholder="請描述商品的細節、使用狀況、面交地點等資訊..."></textarea>
            </div>
            
            <div class="form-group">
                <label for="image">商品相片 (Image)</label>
                <input type="file" id="image" name="image" accept="image/*">
                <small class="form-help-text">允許格式: JPG, JPEG, PNG, GIF</small>
            </div>
            
            <div class="form-actions">
                <a href="/my-products" class="btn btn-outline">取消</a>
                <button type="submit" class="btn btn-primary">確認發佈</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
