<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}校園二手交易平台{% endblock %}</title>
    <!-- 引入全域樣式 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="container navbar-container">
            <a href="/" class="brand">🏫 校園二手交易平台</a>
            <nav class="nav-links">
                <a href="/">首頁</a>
                <a href="/products">所有商品 (F-03, F-04)</a>
                <a href="/product/add">刊登商品 (F-02)</a>
                <a href="/my-products">我的商品 (F-02)</a>
            </nav>
            <div class="auth-buttons">
                <a href="/login" class="btn btn-outline">登入 (F-01)</a>
                <a href="/register" class="btn btn-primary">註冊 (F-01)</a>
            </div>
        </div>
    </header>

    <main class="container content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container text-center">
            <p>&copy; 2026 校園二手交易平台 - 期末專案開發 (SDLC Phase 1 Revised)</p>
        </div>
    </footer>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
